# --- ACTUALIZACIONES ---
update-checker:
  enabled: true
  notify-admins: true

# --- TIEMPOS ---
lobby-countdown: 30
paint-time: 90
vote-time: 25
podium-time: 10
announce-interval: 300

# --- JUGADORES ---
min-players: 2
max-players: 8
rounds: 3

# --- LIENZO ---
canvas-size: 16
canvas-spacing: 6
canvas-floor: WHITE_CONCRETE
canvas-border: GRAY_CONCRETE

# --- PUNTOS ---
points-first: 300
points-second: 200
points-third: 100
points-vote-received: 50
points-voted: 10

# --- RANGOS ---
ranks:
  aprendiz:
    name: "§7Aprendiz"
    min-points: 0
    icon: WOODEN_SWORD
  artista:
    name: "§aArtista"
    min-points: 1000
    icon: IRON_SWORD
  maestro:
    name: "§bMaestro"
    min-points: 5000
    icon: DIAMOND_SWORD
  leyenda:
    name: "§6§lLeyenda"
    min-points: 15000
    icon: NETHERITE_SWORD

# --- MONEDAS ---
coins-win: 100
coins-second: 60
coins-third: 30
coins-participate: 10
coins-vote: 5

# --- MYSQL ---
mysql:
  enabled: false
  host: localhost
  port: 3306
  database: advancedpaintbattle
  username: root
  password: password
  table-prefix: apb_

# --- DISCORD WEBHOOK ---
discord:
  enabled: false
  webhook-url: ''
  announce-winners: true
  announce-tournaments: true

# --- VAULT ---
vault:
  enabled: false
  reward-first: 1000
  reward-second: 500
  reward-third: 250

# --- WORLDGUARD ---
worldguard:
  enabled: false
  respect-regions: true

# --- BUNGEECORD ---
bungeecord:
  enabled: false

# --- IDIOMA ---
language: es

# --- EFECTOS ---
effects:
  fireworks: true
  particles: true
  sounds: true
  titles: true

# --- EVENTOS ESPECIALES ---
events:
  halloween:
    enabled: true
    month: 10
  christmas:
    enabled: true
    month: 12
  new-year:
    enabled: true
    month: 1
    day: 1

# --- ANUNCIOS ---
announcements:
  enabled: true
  interval: 300

